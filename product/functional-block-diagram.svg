<?xml version="1.0" encoding="UTF-8"?>
<svg width="800" height="400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .box { fill: #f0f7ff; stroke: #2c5aa0; stroke-width: 2; rx: 5; }
      .title { font-family: Arial; font-size: 14px; fill: #2c5aa0; font-weight: bold; }
      .label { font-family: Arial; font-size: 12px; fill: #333; }
      .arrow { stroke: #333; stroke-width: 2; fill: none; marker-end: url(#arrowhead); }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#333" />
    </marker>
  </defs>
  
  <!-- User Interaction Layer -->
  <rect x="20" y="20" width="760" height="80" class="box"/>
  <text x="350" y="45" class="title">用户交互层</text>
  <rect x="40" y="55" width="130" height="35" class="box"/>
  <text x="65" y="78" class="label">APP预约</text>
  <rect x="190" y="55" width="130" height="35" class="box"/>
  <text x="215" y="78" class="label">启动/暂停</text>
  <rect x="340" y="55" width="130" height="35" class="box"/>
  <text x="365" y="78" class="label">进度查看</text>
  <rect x="490" y="55" width="130" height="35" class="box"/>
  <text x="515" y="78" class="label">异常报警</text>
  
  <!-- Arrow -->
  <line x1="400" y="100" x2="400" y3="115" class="arrow"/>
  
  <!-- Task Scheduling Layer -->
  <rect x="20" y="120" width="760" height="80" class="box"/>
  <text x="350" y="145" class="title">任务调度层</text>
  <rect x="80" y="160" width="160" height="35" class="box"/>
  <text x="100" y="183" class="label">流程编排引擎</text>
  <rect x="260" y="160" width="160" height="35" class="box"/>
  <text x="280" y="183" class="label">状态机管理</text>
  <rect x="440" y="160" width="160" height="35" class="box"/>
  <text x="460" y="183" class="label">异常处理模块</text>
  
  <!-- Arrow -->
  <line x1="400" y="200" x2="400" y3="215" class="arrow"/>
  
  <!-- Execution Layer -->
  <rect x="20" y="220" width="760" height="80" class="box"/>
  <text x="350" y="245" class="title">执行控制层</text>
  <rect x="40" y="255" width="130" height="35" class="box"/>
  <text x="55" y="278" class="label">机械臂控制</text>
  <rect x="190" y="255" width="130" height="35" class="box"/>
  <text x="215" y="278" class="label">视觉定位</text>
  <rect x="340" y="255" width="130" height="35" class="box"/>
  <text x="355" y="278" class="label">力反馈控制</text>
  <rect x="490" y="255" width="130" height="35" class="box"/>
  <text x="510" y="278" class="label">传感器IO</text>
  
  <!-- Arrow -->
  <line x1="400" y="300" x2="400" y3="315" class="arrow"/>
  
  <!-- Hardware Layer -->
  <rect x="20" y="320" width="760" height="60" class="box"/>
  <text x="350" y="345" class="title">硬件物理层</text>
</svg>
